<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tlaxiaco: Historia Viva</title>
<meta name="theme-color" content="#2d1810">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HOME -->
<div id="home" class="s on">
  <div class="home-bg">🏰</div>
  <h1 class="home-title">Tlaxiaco</h1>
  <p class="home-sub">Historia Viva de Nuestra Tierra</p>
  <p class="home-desc">Descubre los secretos, leyendas y personajes que formaron nuestra tierra tlaxiaquense</p>
  <button class="bbtn bbtn-gold bbtn-huge" onclick="App.go('menu')">🏛️ Explorar</button>
</div>

<!-- MENU -->
<div id="menu" class="s">
  <h2>Elige tu aventura</h2>
  <div class="menu-grid">
    <button class="menu-card" onclick="App.startMode('timeline')">
      <div class="menu-icon">📜</div>
      <div class="menu-title">Línea del Tiempo</div>
      <div class="menu-desc">Recorre los siglos de historia</div>
    </button>
    <button class="menu-card" onclick="App.startMode('quiz')">
      <div class="menu-icon">🧠</div>
      <div class="menu-title">Quiz Histórico</div>
      <div class="menu-desc">Pon a prueba tus conocimientos</div>
    </button>
    <button class="menu-card" onclick="App.startMode('legends')">
      <div class="menu-icon">👻</div>
      <div class="menu-title">Leyendas</div>
      <div class="menu-desc">Historias que aún se cuentan</div>
    </button>
    <button class="menu-card" onclick="App.startMode('figures')">
      <div class="menu-icon">👤</div>
      <div class="menu-title">Personajes</div>
      <div class="menu-desc">Los que forjaron Tlaxiaco</div>
    </button>
    <button class="menu-card" onclick="App.startMode('geography')">
      <div class="menu-icon">🗺️</div>
      <div class="menu-title">Geografía</div>
      <div class="menu-desc">Conoce nuestra tierra</div>
    </button>
    <button class="menu-card" onclick="App.startMode('culture')">
      <div class="menu-icon">🎭</div>
      <div class="menu-title">Cultura</div>
      <div class="menu-desc">Tradiciones y costumbres</div>
    </button>
    <button class="menu-card" onclick="App.startCivicMode('civicValues')">
      <div class="menu-icon">⚖️</div>
      <div class="menu-title">Valores Cívicos</div>
      <div class="menu-desc">Aprende y practica valores</div>
    </button>
    <button class="menu-card" onclick="App.startCivicMode('civicQuiz')">
      <div class="menu-icon">📝</div>
      <div class="menu-title">Quiz de Valores</div>
      <div class="menu-desc">Pon a prueba tus valores</div>
    </button>
    <button class="menu-card" onclick="App.startCivicMode('scenarios')">
      <div class="menu-icon">🎭</div>
      <div class="menu-title">Escenarios</div>
      <div class="menu-desc">Toma decisiones reales</div>
    </button>
    <button class="menu-card" onclick="App.startCivicMode('memory')">
      <div class="menu-icon">🧠</div>
      <div class="menu-title">Memory de Valores</div>
      <div class="menu-desc">Encuentra las parejas</div>
    </button>
  </div>
  <button class="bbtn bbtn-ghost bbtn-sm" onclick="App.go('home')">← Volver</button>
</div>

<!-- CONTENT SCREEN -->
<div id="content" class="s">
  <div class="content-header">
    <button class="back-btn" onclick="App.go('menu')">←</button>
    <h2 id="contentTitle">Título</h2>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="content-body" id="contentBody"></div>
  <div class="content-nav">
    <button class="bbtn bbtn-ghost bbtn-sm" id="prevBtn" onclick="App.prev()">← Anterior</button>
    <span id="pageIndicator">1/10</span>
    <button class="bbtn bbtn-blue bbtn-sm" id="nextBtn" onclick="App.next()">Siguiente →</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="s">
  <div class="content-header">
    <button class="back-btn" onclick="App.go('menu')">←</button>
    <h2 id="quizTitle">Quiz</h2>
    <div class="quiz-score" id="quizScore">0/10</div>
  </div>
  <div class="quiz-question" id="quizQuestion"></div>
  <div class="quiz-options" id="quizOptions"></div>
  <div class="quiz-feedback" id="quizFeedback"></div>
  <button class="bbtn bbtn-blue bbtn-sm" id="quizNext" onclick="App.nextQuestion()" style="display:none">Siguiente →</button>
</div>

<!-- LEGEND SCREEN -->
<div id="legend" class="s">
  <div class="content-header">
    <button class="back-btn" onclick="App.go('menu')">←</button>
    <h2 id="legendTitle">Leyenda</h2>
  </div>
  <div class="legend-content" id="legendContent"></div>
  <button class="bbtn bbtn-ghost bbtn-sm" onclick="App.go('menu')">← Volver</button>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="s">
  <div class="result-icon" id="resultIcon">🏆</div>
  <h2 id="resultTitle">¡Completado!</h2>
  <p id="resultDesc">Has descubierto la historia de Tlaxiaco</p>
  <div class="result-stats" id="resultStats"></div>
  <button class="bbtn bbtn-gold bbtn-sm" onclick="App.go('menu')">Seguir Explorando</button>
  <button class="bbtn bbtn-ghost bbtn-sm" onclick="App.go('home')">Volver al Inicio</button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

<!-- MEMORY GAME -->
<div id="memory" class="s">
  <div class="content-header">
    <button class="back-btn" onclick="App.go('menu')">←</button>
    <h2>🧠 Memory de Valores Cívicos</h2>
    <div class="quiz-score" id="memoryScore">0 intentos</div>
  </div>
  <div class="memory-content" id="memoryContent"></div>
  <button class="bbtn bbtn-ghost bbtn-sm" onclick="App.go('menu')">← Volver</button>
</div>

</body>
</html>
